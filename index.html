<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Superstore Dashboard</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    font-family:Poppins, sans-serif;
    color:white;
    overflow:hidden;
}


.header{

    height:80px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 40px;

    background:rgba(255,255,255,0.05);

    backdrop-filter:blur(10px);

    border-bottom:1px solid rgba(255,255,255,0.1);
}

.header h1{
    color:#facc15;
    letter-spacing:2px;
}

.profile{
    text-align:right;
}

.profile p{
    font-size:14px;
}


.container{
    display:flex;
    height:calc(100vh - 80px);
}


.sidebar{

    width:280px;

    padding:30px;

    background:rgba(255,255,255,0.03);

    border-right:1px solid rgba(255,255,255,0.08);
}

.card{

    background:rgba(255,255,255,0.05);

    padding:20px;

    border-radius:20px;

    margin-bottom:20px;

    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.card h2{

    font-size:18px;

    margin-bottom:10px;

    color:#38bdf8;
}

.card p{

    font-size:14px;

    line-height:1.8;
}


.content{

    flex:1;

    display:flex;

    justify-content:center;
    align-items:center;
}

svg{
    width:100%;
    height:100%;
}

.link{
    fill:none;
    stroke:#64748b;
    stroke-opacity:0.6;
    stroke-width:2px;
}

.node text{
    font-size:13px;
    fill:white;
}

.node circle{
    transition:0.3s;
}

.node circle:hover{
    r:10;
}

</style>
</head>

<body>

<div class="header">

    <h1>SUPERSTORE DASHBOARD</h1>

    <div class="profile">
        <p><b>Nama:</b> RISKA FEBRIANA RAHMAWATI</p>
        <p><b>NPM:</b> 23082010136</p>
    </div>

</div>

<div class="container">

    <div class="sidebar">

        <div class="card">
            <h2>Total Data</h2>
            <p>Superstore hierarchy visualization using D3.js Radial Tree Diagram.</p>
        </div>

        <div class="card">
            <h2>Hierarchy</h2>

            <p>
                Tahun <br>
                → Quartal <br>
                → Category
            </p>
        </div>

        <div class="card">
            <h2>Visualization</h2>

            <p>
                Radial Tidy Tree Diagram built using D3.js version 7.
            </p>
        </div>

    </div>

    <div class="content">

        <svg></svg>

    </div>

</div>

<script>

const width = 1000;
const radius = width / 2;

const tree = d3.tree()
    .size([2 * Math.PI, radius - 180]);

const svg = d3.select("svg")
    .attr("viewBox", [-width/2, -width/2, width, width]);

d3.json("data.json").then(data => {

    const root = d3.hierarchy(data);

    tree(root);

    svg.append("g")
        .selectAll("path")
        .data(root.links())
        .join("path")
        .attr("class","link")
        .attr("d",
            d3.linkRadial()
                .angle(d => d.x)
                .radius(d => d.y)
        );

    const node = svg.append("g")
        .selectAll("g")
        .data(root.descendants())
        .join("g")
        .attr("class","node")
        .attr("transform", d => `
            rotate(${d.x * 180 / Math.PI - 90})
            translate(${d.y},0)
        `);

    node.append("circle")
        .attr("r", d => {

            if(d.depth === 0) return 12;
            if(d.depth === 1) return 9;
            if(d.depth === 2) return 7;
            return 5;

        })

        .attr("fill", d => {

            if(d.depth === 0) return "#f43f5e";
            if(d.depth === 1) return "#8b5cf6";
            if(d.depth === 2) return "#06b6d4";

            return "#facc15";

        })

        .style("filter","drop-shadow(0px 0px 8px rgba(255,255,255,0.3))");

    node.append("text")
        .attr("dy","0.31em")
        .attr("x", d => d.x < Math.PI ? 15 : -15)
        .attr("text-anchor", d => d.x < Math.PI ? "start" : "end")
        .attr("transform", d => d.x >= Math.PI ? "rotate(180)" : null)
        .text(d => d.data.name);

});

</script>

</body>
</html>
